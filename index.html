<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/47872ad715.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <title>Tela de Login</title>
</head>
<body>

    <main class="container">
        <frorm>
           <h1>Seu Login</h1> 
           <div class = "input-box">
            <input placeholder = "Usuário" type="email">
            <i class="fa-solid fa-user"></i>
           </div>
           <div class="input-box">
            <input placeholder = "Senha" type="password">
            <i class="fa-solid fa-key"></i>
           </div>

           <div class="lembrar-me">
                <label>
                    <input type="checkbox">
                    Lembrar Minha Senha 
                </label>
                <a href="#"> Esqueci a senha</a>
            </div>
            <button type="submit" class="login">Login</button>

            <div class="registar">

                <p>Não tem uma conta? <a href="#">Registrar-se</a></p>

            </div>
        </frorm>
                  
    </main>
</body>
</html>
